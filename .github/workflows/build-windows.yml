name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name STCloseUpdater --collect-all akshare --collect-all py_mini_racer --collect-all curl_cffi st_close_gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: STCloseUpdater-windows
          path: dist/STCloseUpdater.exe
